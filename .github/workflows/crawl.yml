name: Crawl Data

on:
  schedule:
    - cron: '0 4 * * *' # Run daily at 12:00 PM UTC+8 (4:00 AM UTC)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default sparse-checkout (--cone) doesn't bring tracked files in
          # subdirectories like result/ into the working tree. Disable so
          # the subsequent `git checkout -B result origin/result` step can
          # populate result/ correctly for the crawler to read.
          sparse-checkout: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install node modules
        run: pnpm install

      # 先還原 result 分支裡的歷史資料，但不要切走 main checkout；
      # crawler 仍需要 main 上的 package.json / CrawlPopular.mjs / src。
      - name: Restore result data
        run: |
          git fetch origin result:refs/remotes/origin/result
          rm -rf result
          git archive origin/result result | tar -x

      - name: Crawl data
        run: pnpm run crawldata

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          result_worktree="$(mktemp -d)"
          rm -rf "$result_worktree"
          git worktree add "$result_worktree" origin/result
          rm -rf "$result_worktree/result"
          mkdir -p "$result_worktree/result"
          cp -a result/. "$result_worktree/result/"
          cd "$result_worktree"
          git add result -f
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")"
          git push origin HEAD:result
