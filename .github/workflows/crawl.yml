name: Crawl Data

on:
  schedule:
    - cron: '0 4 * * *' # Run daily at 12:00 PM UTC+8 (4:00 AM UTC)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default sparse-checkout (--cone) doesn't bring tracked files in
          # subdirectories like result/ into the working tree. Disable so
          # the subsequent `git checkout -B result origin/result` step can
          # populate result/ correctly for the crawler to read.
          sparse-checkout: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install node modules
        run: pnpm install

      # 先 checkout result 分支(包含歷史 list.json + 所有 raw 檔案),
      # 再跑 crawler,這樣 CrawlPopular.mjs 才能讀到既有的 list.json 來累積,
      # 而不是從 [新檔名] 開始(會讓 list.json 每次都被覆蓋成 1 條)。
      - name: Switch to result branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin result
          if git show-ref --verify --quiet refs/remotes/origin/result; then
            git checkout -B result origin/result
          else
            git checkout --orphan result
          fi

      - name: Crawl data
        run: pnpm run crawldata

      - name: Commit and push
        run: |
          git add result/* -f
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")"
          git push origin result