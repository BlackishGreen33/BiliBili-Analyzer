name: Crawl Data

on:
  schedule:
    - cron: '0 4 * * *' # Run daily at 12:00 PM UTC+8 (4:00 AM UTC)
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install node modules
        run: pnpm install
      - name: Crawl data
        run: pnpm run crawldata
      - name: Save crawl output
        run: |
          mkdir -p /tmp/crawl-output
          cp -r result/. /tmp/crawl-output/
      - name: Switch to result branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin result
          if git show-ref --verify --quiet refs/remotes/origin/result; then
            git checkout -B result origin/result
          else
            git checkout --orphan result
          fi
      - name: Apply crawl output
        run: |
          mkdir -p result
          cp -r /tmp/crawl-output/. result/
      - name: Push to result branch
        run: |
          git add result/* -f
          git commit -m "$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S")"
          git push origin result
